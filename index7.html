<!DOCTYPE html>
<html>
<head>
<style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            transition: background-color 0.3s;
        }

        button {
            padding: 15px 30px;
            font-size: 24px;
            margin: 10px;
            cursor: pointer;
            border-radius: 10px;
            border: 1px solid #ccc;
        }

        #counter {
            font-size: 80px;
            margin: 30px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <p id="counter">0</p>

    <button id="minusBtn">-</button>
    <button id="plusBtn">+</button>

    <script src="script7.js"></script>
</body>
</html>
